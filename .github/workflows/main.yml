name: Build RAGFlow ARM64 Image
          ref: ${{ env.RAGFLOW_VERSION }}
          path: ragflow

      - name: Checkout build config (current repo)
        uses: actions/checkout@v4
        with:
          path: build-config

      - name: Replace with optimized Dockerfile
        run: |
          cp build-config/Dockerfile.arm64-optimized ragflow/Dockerfile
          echo "✅ Dockerfile replaced with ARM64 optimized version"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # ========== 构建 ragflow 主镜像 ==========
      # 前端使用 BUILDPLATFORM 原生 x86 架构极速编译
      # 后端运行时使用 linux/arm64 架构
      # 依赖直接使用官方 infiniflow/ragflow_deps:latest
      - name: Build and push RAGFlow ARM64 image
        working-directory: ragflow
        run: |
          docker buildx build \
            --platform linux/arm64 \
            -f Dockerfile \
            -t ${{ secrets.DOCKER_USERNAME }}/ragflow:${{ env.IMAGE_TAG }} \
            --push \
            .

      - name: ✅ Build completed
        run: |
          echo "=========================================="
          echo "  Build completed successfully!"
          echo "  Image: ${{ secrets.DOCKER_USERNAME }}/ragflow:${{ env.IMAGE_TAG }}"
          echo "  Architecture: linux/arm64"
          echo "=========================================="
