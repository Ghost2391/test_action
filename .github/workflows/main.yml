name: Build RAGFlow ARM64 Image

on:
  workflow_dispatch:
    inputs:
      ragflow_version:
        description: 'RAGFlow version tag (e.g., v0.26.3)'
        required: true
        default: 'v0.26.3'
      image_tag:
        description: 'Docker image tag suffix'
        required: true
        default: 'arm64'

env:
  RAGFLOW_VERSION: ${{ github.event.inputs.ragflow_version }}
  IMAGE_TAG: ${{ github.event.inputs.ragflow_version }}-${{ github.event.inputs.image_tag }}

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout build config (current repo)
        uses: actions/checkout@v4
        with:
          path: build-config

      - name: Checkout RAGFlow source
        uses: actions/checkout@v4
        with:
          repository: infiniflow/ragflow
          ref: ${{ env.RAGFLOW_VERSION }}
          path: ragflow

      - name: Replace with optimized Dockerfile
        run: |
          cp build-config/Dockerfile.arm64-optimized ragflow/Dockerfile
          echo "✅ Dockerfile replaced with ARM64 optimized version"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # ========== 构建并推送 RAGFlow ARM64 镜像 ==========
      # 前端使用 BUILDPLATFORM 原生 x86 架构极速编译
      # 后端运行时使用 linux/arm64 架构（QEMU 模拟）
      # cache-from/cache-to: GHA 缓存，下次构建复用已编译层
      - name: Build and push RAGFlow ARM64 image
        uses: docker/build-push-action@v6
        with:
          context: ragflow
          file: ragflow/Dockerfile
          platforms: linux/arm64
          tags: ${{ secrets.DOCKER_USERNAME }}/ragflow:${{ env.IMAGE_TAG }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: ✅ Build completed
        run: |
          echo "=========================================="
          echo "  Build completed successfully!"
          echo "  Image: ${{ secrets.DOCKER_USERNAME }}/ragflow:${{ env.IMAGE_TAG }}"
          echo "  Architecture: linux/arm64"
          echo "=========================================="
          echo ""
          echo "下次构建将复用 GHA 缓存，速度会快很多"
